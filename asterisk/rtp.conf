; =============================================================================
; Asterisk RTP Configuration (Production Setup)
; =============================================================================
; File: /etc/asterisk/rtp.conf
; =============================================================================

[general]
; FIXED: Exact standard PBX range mapped properly to Docker.
; ADDED: Firewall must allow UDP 10000–20000 publicly. Do not restrict.
rtpstart = 10000
rtpend = 20000

; UPDATED: Enforce strict RTP checking to protect against RTP bleed / injections.
; Only accepts RTP packets from the IP that signaled the SIP INVITE.
strictrtp = yes

; FIXED: Send 1 RTP packet per second while ringing so NAT gateways lock the port open.
rtpkeepalive = 10

; ADDED: LiveKit SIP handles WebRTC ICE internally; PBX side must disable ICE.
icesupport = no

; (Optional) STUN server if Asterisk is inside deep NAT without 1:1 Public IP.
; Expected config uses external_media_address in pjsip.conf instead, so no STUN needed.
; stunaddr = stun.l.google.com:19302

dtls_verify = no
